<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Employee Manager</title>
<link rel = "stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
@import url('https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap');
:root {
    --white-color: #fff;
    --primary-color: #4A6741;
    --secondary-color: #D4AF37;
    --dark-color: #000;
    --font-size-m: 1.12rem;
    --font-size-l: 1.5rem;
    --border-radius-m: 30px;
    --border-radius-s: 8px;

    --font-size-s: 0.9remn;
    --font-size-n: 1rem;
    --font-size-m: 1.12rem;
    --font-size-l: 1.5rem;    
    --font-size-xl: 2rem;
    --font-size-xxl: 2.3rem;
    
    --font-weight-normal: 400;
    --font-weight-medium: 500;
    --font-weight-semi-bold: 600;
    --font-weight-bold: 700;   
}

main {
    padding-top: 100px;   /* ← add this */
    padding-left: 20px;
    padding-right: 20px;
    padding-bottom: 40px;
}

body {
  background: #1c1c1c;
  color: #d0d0d0;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}

/*Navbar Styling*/
ul{
    list-style: none;
}

.section-content {
    margin: 0 auto;
    padding: 0 20px;
    max-width: 1300px;
}

a{
    text-decoration: none;
}

button {
    cursor: pointer;
    border: none;
    background: none;
}

header {
    position: fixed;
    width: 100%;
    z-index: 5;
    background: var(--primary-color) ;
}

header .navbar {
    display: flex;
    padding: 30px;
    align-items: center;
    justify-content: space-between;
}

.navbar .nav-logo .logo-text {
    color: var(--white-color);
    font-size: 25px;
    font-weight: var(--font-semi-bold);
}

.navbar .nav-menu {
    display: flex;
    gap: 10px;
}

.navbar .nav-menu .nav-link {
    padding: 10px 18px;
    color: var(--white-color);
    font-size: var(--font-size-m);
    border-radius: var(--border-radius-m);
    transition: 0.3s ease;
} 

.navbar .nav-menu .nav-link:hover {
    color: var(--primary-color);
    background: var(--secondary-color);

}

.navbar :where(#menu-close-button, #menu-open-button) {
    display: none;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 14px;
}

.stat-card {
  background: #2a2a2a;
  border-radius: 10px;
  padding: 18px 20px;
}

.stat-card .label { font-size: 13px; color: #888; margin-bottom: 6px; }
.stat-card .value { font-size: 28px; font-weight: 600; color: #e8e8e8; line-height: 1.1; }
.stat-card .sub   { font-size: 12px; color: #666; margin-top: 4px; }

.panels-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 14px;
}

.panel {
  background: #2a2a2a;
  border-radius: 10px;
  padding: 22px;
}

.panel-title {
  font-size: 16px;
  font-weight: 600;
  color: #e0e0e0;
  margin-bottom: 18px;
}

.field-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 12px;
}

.field-row.full { grid-template-columns: 1fr; }
.field { display: flex; flex-direction: column; gap: 6px; }

.field label {
  font-size: 12px;
  color: #888;
}

.field input,
.field select {
  background: #333;
  border: 1px solid #404040;
  border-radius: 7px;
  padding: 9px 11px;
  font-size: 13px;
  color: #d0d0d0;
  outline: none;
  width: 100%;
  font-family: inherit;
}

.field input::placeholder { color: #555; }
.field input:focus, .field select:focus { border-color: #585858; }

/* number with arrow spinners */
.num-wrap { position: relative; }
.num-wrap input { padding-right: 24px; }
.num-arrows {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 0;
}
.num-arrows button {
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 7px;
  line-height: 10px;
  padding: 0 2px;
  display: block;
}
.num-arrows button:hover { color: #aaa; }

.btn-main {
  width: 100%;
  margin-top: 14px;
  padding: 11px;
  background: #353535;
  border: 1px solid #4a4a4a;
  border-radius: 8px;
  color: #d0d0d0;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
}
.btn-main:hover { background: #404040; }

.log-result {
  margin-top: 12px;
  background: #242424;
  border-radius: 8px;
  padding: 10px 13px;
  font-size: 13px;
  color: #888;
  display: none;
}
.log-result.show { display: block; }
.log-result .green { color: #3ecf8e; }

.search-wrap { margin-top: 22px; }
.section-title { font-size: 16px; font-weight: 600; color: #e0e0e0; margin-bottom: 14px; }

.search-row { display: flex; gap: 8px; margin-bottom: 10px; }
.search-row input {
  flex: 1;
  background: #333;
  border: 1px solid #404040;
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 13px;
  color: #d0d0d0;
  outline: none;
  font-family: inherit;
}
.search-row input::placeholder { color: #555; }
.search-row input:focus { border-color: #585858; }
.search-row .sbtn {
  background: #333;
  border: 1px solid #404040;
  border-radius: 7px;
  padding: 9px 16px;
  color: #d0d0d0;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}
.search-row .sbtn:hover { background: #3a3a3a; }

.emp-row-result {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 4px 0;
}

.section-title {
    text-transform: none;
}

.avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

.emp-inf { flex: 1; }
.emp-inf .ename { font-size: 13px; color: #d0d0d0; font-weight: 500; }
.emp-inf .emeta { font-size: 12px; color: #666; margin-top: 1px; }

.badge {
  font-size: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-weight: 500;
  white-space: nowrap;
}
.badge-ft { background: #0d2e1f; color: #3ecf8e; }
.badge-pt { background: #2b2007; color: #d4a017; }

/* table section */
.table-section {
  background: #2a2a2a;
  border-radius: 10px;
  padding: 22px 22px 6px;
}

.table-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
}
.table-title { font-size: 16px; font-weight: 600; color: #e0e0e0; }
.table-controls { display: flex; gap: 8px; }
.table-controls select,
.table-controls button {
  background: #333;
  border: 1px solid #404040;
  border-radius: 7px;
  padding: 7px 14px;
  color: #d0d0d0;
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
}
.table-controls select { outline: none; }
.table-controls button:hover { background: #3a3a3a; }

table { width: 100%; border-collapse: collapse; }

thead th {
  font-size: 12px;
  color: #666;
  font-weight: 400;
  text-align: left;
  padding: 0 12px 12px;
  border-bottom: 1px solid #333;
}

tbody td {
  padding: 13px 12px;
  border-bottom: 1px solid #333;
  font-size: 13px;
  color: #c8c8c8;
  vertical-align: middle;
}
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover { background: #2e2e2e; }

.td-emp { display: flex; align-items: center; gap: 10px; }
.td-name  { font-size: 13px; color: #d0d0d0; font-weight: 500; }
.td-phone { font-size: 11px; color: #555; margin-top: 2px; }

.pay { color: #3ecf8e; }

.hrs-bar {
  height: 4px;
  border-radius: 2px;
  background: #3ecf8e;
  margin-top: 5px;
  opacity: 0.65;
}

.remove-btn {
  background: #333;
  border: 1px solid #404040;
  border-radius: 7px;
  padding: 6px 14px;
  color: #999;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
}

/* Responsive Media for max width 900px */
@media screen and (max-width: 900px) {
    :root {
        --font-size-m: 1rem;
        --font-size-l: 1.3rem;
        --font-size-xl: 1.5rem;
        --font-size-xxl: 1.8rem;
        
    }

    body.show-mobile-menu header::before {
        content: "";
        position: fixed;
        left: 0;
        top: 0;
        height: 100%;
        width: 100%;
        backdrop-filter: blur(5px);
        background: rgba(0, 0, 0, 0.2);
        
    }

    .navbar :where(#menu-close-button, #menu-open-button){
        font-size: var(--font-size-l);
        display: block;
    }
    
    
    .navbar #menu-close-button {
        position: absolute;
        right: 30px;
        top: 30px;
    }

    .navbar #menu-open-button {
        color: var(--white-color);
    }

    
    .navbar .nav-menu {
        display: block;
        position: fixed;
        left: -300px;
        top: 0;
        width: 300px;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding-top: 100px;
        background: var(--white-color);
        transition: left 0.2s ease;
    }

    body.show-mobile-menu .navbar .nav-menu {
    left: 0;
}
.navbar .nav-menu .nav-link {
    color: var(--dark-color);
    display: block;
    margin-top: 17px;
    font-size: 20px;
}

.stats-row {
    grid-template-columns: 1fr 1fr;
}

.panels-row {
    grid-template-columns: 1fr;
 }

#table-wrap {
  width: 100%;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

table {
  min-width: 760px;
}

}

.remove-btn:hover { border-color: #c0392b; color: #e74c3c; background: #2a1515; }

.empty { color: #555; font-size: 13px; padding: 30px; text-align: center; }

/* avatar color map */
.av0 { background:#162333; color:#4f86c6; }
.av1 { background:#301a10; color:#c47e3e; }
.av2 { background:#152a18; color:#5a9e6f; }
.av3 { background:#261528; color:#a05c7b; }
.av4 { background:#182333; color:#6c8ebf; }
.av5 { background:#2a2412; color:#b8a040; }
.av6 { background:#1c1630; color:#7c6f9f; }
.av7 { background:#122a23; color:#3ecf8e; }
</style>
</head>

        <nav class="navbar section-content">

               <li class="nav-item">

                </li>

<main>
<section class="stats-section">
<!-- STATS -->
<div class="stats-row">
  <div class="stat-card">
    <div class="label">Total employees</div>
    <div class="value" id="s-total">—</div>
    <div class="sub" id="s-ft">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Total payroll</div>
    <div class="value" id="s-payroll">—</div>
    <div class="sub">this period</div>
  </div>
  <div class="stat-card">
    <div class="label">Avg hours worked</div>

  </div>

    <div class="label">Avg hourly rate</div>
    <div class="value" id="s-avgrate">—</div>
    <div class="sub">across all staff</div>
  </div>
</div>
</section>

<section class="twoPanels-section">
<!-- TWO PANELS -->
<div class="panels-row">

  <!-- Add employee -->
  <div class="panel">
    <div class="panel-title">Add employee</div>

    <div class="field-row">
      <div class="field">
        <label>Full name</label>
        <input id="inp-name" placeholder="e.g. James Miller"/>
      </div>
      <div class="field">
        <label>Job type</label>
        <input id="inp-job" placeholder="Detailer"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Hourly rate ($)</label>
        <div class="num-wrap">
          <input id="inp-rate" type="number" min="0" step="1" placeholder="25.00"/>
          <div class="num-arrows">
            <button onclick="nudge('inp-rate',1)">▲</button>
            <button onclick="nudge('inp-rate',-1)">▼</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>Phone</label>
        <input id="inp-phone" placeholder="559-555-0100"/>
      </div>
    </div>

    <div class="field-row full">
      <div class="field">
        <label>Email</label>
        <input id="inp-email" type="email" placeholder="employee@email.com"/>
      </div>
    </div>

    <button class="btn-main" onclick="addEmployee()">Add employee</button>
  </div>

  <!-- Log hours + Search -->
  <div class="panel">
    <div class="panel-title">Log hours</div>

    <div class="field-row">
      <div class="field">
        <label>Employee ID</label>
        <select id="log-id"></select>
      </div>
      <div class="field">
        <label>Hours to add</label>
        <div class="num-wrap">
          <input id="log-hrs" type="number" min="0" step="0.5" value="8.0"/>
          <div class="num-arrows">
            <button onclick="nudge('log-hrs',0.5)">▲</button>
            <button onclick="nudge('log-hrs',-0.5)">▼</button>
          </div>
        </div>
      </div>
    </div>

    <button class="btn-main" onclick="logHours()">Log hours</button>
    <div class="log-result" id="log-result"></div>

    <div class="search-wrap">
      <div class="section-title">Search Employee</div>
      <div class="search-row">
        <input id="search-inp" placeholder="Search by name..."
               onkeydown="if(event.key==='Enter')doSearch()"/>

</div>
</section>

<section class="allEmployees-section">
<!-- ALL EMPLOYEES TABLE -->
<div class="table-section">
  <div class="table-header">
    <div class="table-title">All employees</div>
    <div class="table-controls">
      <select id="filter-type" onchange="renderTable()">
        <option value="">All types</option>
      </select>
      <button onclick="sortByName()">Sort by name</button>
    </div>
  </div>
  <div id="table-wrap"><div class="empty">Loading…</div></div>
</div>
</section>
</main>
<script>
// ── auto detect which server you're on ───────────────

const menuOpenButton = document.querySelector("#menu-open-button");
const menuCloseButton = document.querySelector("#menu-close-button");

// ── auto detect which server you're on ───────────────
const isLiveServer = window.location.port === '5500' || 
                     window.location.port === '5501';

menuOpenButton.addEventListener("click", () => {
    //toggle mobile menu 
    document.body.classList.toggle("show-mobile-menu");

});

//Close menu when the close button is clicked
menuCloseButton.addEventListener("click", () => menuOpenButton.click());

const API = 'http://localhost:8080/api';
let employees = [];
let sortAsc = true;

function avClass(name) {
  let h = 0;
  for (let c of name) h = (h * 31 + c.charCodeAt(0)) % 8;
  return 'av' + h;
}

function initials(name) {
  return name.trim().split(/\s+/).map(w => w[0]).join('').toUpperCase().slice(0, 2);
}

function avHtml(name, size) {
  size = size || 34;
  return `<div class="avatar ${avClass(name)}" style="width:${size}px;height:${size}px">${initials(name)}</div>`;
}

function nudge(id, d) {
  const el = document.getElementById(id);
  const v = parseFloat(el.value) || 0;
  el.value = parseFloat((v + d).toFixed(2));
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

async function loadEmployees() {
  try {
    const r = await fetch(API + '/employees');
    employees = await r.json();
    renderStats();
    renderTable();
    populateSelect();
    populateFilter();
  } catch(e) {
    document.getElementById('table-wrap').innerHTML =
      '<div class="empty">Cannot connect to server at localhost:8080.<br>Make sure your C++ backend is running.</div>';
  }
}

function renderStats() {
  const n   = employees.length;
  const ft  = employees.filter(e => e.isFullTime).length;
  const pay = employees.reduce((s, e) => s + e.totalPay, 0);
  const ah  = n ? employees.reduce((s, e) => s + e.hoursWorked, 0) / n : 0;
  const ar  = n ? employees.reduce((s, e) => s + e.hourlyRate, 0) / n : 0;

  document.getElementById('s-total').textContent   = n;
  document.getElementById('s-ft').textContent      = ft + ' full-time';
  document.getElementById('s-payroll').textContent = '$' + Math.round(pay).toLocaleString('en-US');
  document.getElementById('s-avghrs').textContent  = ah.toFixed(1);
  document.getElementById('s-avgrate').textContent = '$' + ar.toFixed(2);
}

function populateSelect() {
  document.getElementById('log-id').innerHTML = employees.length
    ? employees.map(e => `<option value="${e.id}">${e.id}</option>`).join('')
    : '<option>—</option>';
}

function populateFilter() {
  const types = [...new Set(employees.map(e => e.jobType))].sort();
  const sel = document.getElementById('filter-type');
  const cur = sel.value;
  sel.innerHTML = '<option value="">All types</option>' +
    types.map(t => `<option value="${t}"${t===cur?' selected':''}>${t}</option>`).join('');
}

function renderTable() {
  const f    = document.getElementById('filter-type').value;
  const list = f ? employees.filter(e => e.jobType === f) : [...employees];
  const max  = Math.max(...list.map(e => e.hoursWorked), 1);

  if (!list.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty">No employees.</div>';
    return;
  }

  const rows = list.map(e => {
    const bw = Math.round((e.hoursWorked / max) * 56);
    return `<tr>
      <td>
        <div class="td-emp">
          ${avHtml(e.name, 34)}
          <div>
            <div class="td-name">${esc(e.name)}</div>
            <div class="td-phone">${esc(e.phone)}</div>
          </div>
        </div>
      </td>
      <td style="color:#888">${esc(e.jobType)}</td>
      <td>$${e.hourlyRate.toFixed(2)}/hr</td>
      <td>
        <div style="font-weight:500;color:#d0d0d0">${e.hoursWorked} hrs</div>
        <div class="hrs-bar" style="width:${bw}px"></div>
      </td>
      <td class="pay">$${Math.round(e.totalPay).toLocaleString('en-US')}</td>
      <td><span class="badge ${e.isFullTime ? 'badge-ft' : 'badge-pt'}">${e.isFullTime ? 'Full-time' : 'Part-time'}</span></td>
      <td><button class="remove-btn" onclick="removeEmp(${e.id},'${esc(e.name)}')">Remove</button></td>
    </tr>`;
  }).join('');

  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th>Employee</th><th>Job type</th><th>Rate</th>
        <th>Hours</th><th>Total pay</th><th>Status</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function sortByName() {
  sortAsc = !sortAsc;
  employees.sort((a, b) => sortAsc
    ? a.name.localeCompare(b.name)
    : b.name.localeCompare(a.name));
  renderTable();
}

async function addEmployee() {
  const name  = document.getElementById('inp-name').value.trim();
  const job   = document.getElementById('inp-job').value.trim();
  const rate  = parseFloat(document.getElementById('inp-rate').value);
  const phone = document.getElementById('inp-phone').value.trim();
  const email = document.getElementById('inp-email').value.trim();
  if (!name || !job || isNaN(rate) || !phone) {
    alert('Please fill in name, job type, hourly rate and phone.'); return;
  }
  try {
    const r = await fetch(API + '/employees', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({name, jobType:job, hourlyRate:rate, phone, email})
    });
    const d = await r.json();
    if (d.success) {
      ['inp-name','inp-job','inp-rate','inp-phone','inp-email']
        .forEach(id => document.getElementById(id).value = '');
      loadEmployees();
    }
  } catch(e) { alert('Server error.'); }
}

async function logHours() {
  const id  = parseInt(document.getElementById('log-id').value);
  const hrs = parseFloat(document.getElementById('log-hrs').value);
  if (!id || isNaN(hrs) || hrs <= 0) return;
  try {
    const r = await fetch(API + '/employees/hours/' + id, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({hours: hrs})
    });
    const d = await r.json();
    if (d.success) {
      const el = document.getElementById('log-result');
      el.innerHTML = `Hours added — total: ${d.hoursWorked} hrs → pay: <span class="green">$${Number(d.totalPay).toLocaleString('en-US',{minimumFractionDigits:2})}</span>`;
      el.classList.add('show');
      loadEmployees();
    }
  } catch(e) { alert('Server error.'); }
}

async function doSearch() {
  const q   = document.getElementById('search-inp').value.trim();
  const box = document.getElementById('search-results');
  if (!q) { box.innerHTML = ''; return; }
  try {
    const r = await fetch(API + '/employees/search/' + encodeURIComponent(q));
    const d = await r.json();
    if (d.found === false || !d.id) {
      box.innerHTML = `<div style="font-size:12px;color:#555;padding:6px 0">No results.</div>`;
      return;
    }
    box.innerHTML = `
      <div class="emp-row-result">
        ${avHtml(d.name, 34)}
        <div class="emp-inf">
          <div class="ename">${esc(d.name)}</div>
          <div class="emeta">${esc(d.jobType)} · $${d.hourlyRate}/hr · ${d.hoursWorked} hrs</div>
        </div>
        <span class="badge ${d.isFullTime?'badge-ft':'badge-pt'}">${d.isFullTime?'Full-time':'Part-time'}</span>
      </div>`;
  } catch(e) { box.innerHTML='<div style="color:#e74c3c;font-size:12px">Server error.</div>'; }
}

async function removeEmp(id, name) {
  if (!confirm('Remove ' + name + '?')) return;
  try {
    await fetch(API + '/employees/' + id, {method:'DELETE'});
    loadEmployees();
  } catch(e) { alert('Server error.'); }
}

loadEmployees();
</script>
