<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Manager</title>
    <!-- Linking Font Awesome for icons -->
    <link rel = "stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="invoices.css">

</head>
<body>
    <!-- Header / Navbar  -->
    <header>
        <nav class="navbar section-content">
            <a href="/index2.html" class="nav-logo">
                <h2 class="logo-text">Business Manager</h2>
            </a>
            <ul class="nav-menu">
                <button id="menu-close-button" class="fas fa-times"></button>
                
               <li class="nav-item">
                    <a href="/employees.html" class="nav-link">Employees</a>
                </li>
                <li class="nav-item">
                    <a href="/customers.html" class="nav-link">Customers</a>
                </li>
                <li class="nav-item">
                    <a href="/appointment.html" class="nav-link">Appointments</a>
                </li>
                <li class="nav-item">
                    <a href="/invoices.html" class="nav-link">Invoices</a>
                </li>
                <li class="nav-item">
                    <a href="/quote.html" class="nav-link">Quotes</a>
                </li>
                <li class="nav-item">
                    <a href="/expense.html" class="nav-link">Expenses</a>
                </li>
                <li class="nav-item">
                    <a href="/profitCalculator.html" class="nav-link">Profit</a>
                </li>
            </ul>

            <button id="menu-open-button" class="fas fa-bars"></button>
        </nav>
    </header>

        <main>
 
        <!-- STATS -->
        <section class="stats-section">
            <div class="stats-row">
                <div class="stat-card">
                    <div class="label">Total invoices</div>
                    <div class="value" id="s-total">—</div>
                    <div class="sub">all time</div>
                </div>
                <div class="stat-card">
                    <div class="label">Total billed</div>
                    <div class="value yellow" id="s-billed">—</div>
                    <div class="sub">this period</div>
                </div>
                <div class="stat-card">
                    <div class="label">Paid</div>
                    <div class="value green" id="s-paid">—</div>
                    <div class="sub" id="s-paid-count">— invoices</div>
                </div>
                <div class="stat-card">
                    <div class="label">Unpaid</div>
                    <div class="value red" id="s-unpaid">—</div>
                    <div class="sub" id="s-unpaid-count">— invoices</div>
                </div>
            </div>
        </section>
 
        <!-- TWO PANELS -->
        <section class="twoPanels-section">
            <div class="panels-row">
 
                <!-- Create invoice -->
                <div class="panel">
                    <div class="panel-title">Create invoice</div>
 
                    <div class="field-row">
                        <div class="field">
                            <label>Customer ID</label>
                            <input id="inp-customer-id" type="number" placeholder="e.g. 1"/>
                        </div>
                        <div class="field">
                            <label>Customer name</label>
                            <input id="inp-customer-name" placeholder="e.g. John Smith"/>
                        </div>
                    </div>
 
                    <div class="field-row">
                        <div class="field">
                            <label>Date</label>
                            <input id="inp-date" type="date"/>
                        </div>
                        <div class="field">
                            <label>Amount ($)</label>
                            <input id="inp-amount" type="number" min="0" step="0.01" placeholder="0.00"/>
                        </div>
                    </div>
 
                    <button class="btn-main" onclick="createInvoice()">Create invoice</button>
                </div>
 
                <!-- Filter + Recent activity -->
                <div class="panel">
                    <div class="panel-title">Filter invoices</div>
 
                    <div class="filter-label">Show</div>
                    <div class="filter-row">
                        <button class="filter-btn active" id="f-all"    onclick="setFilter('all')">All</button>
                        <button class="filter-btn"        id="f-paid"   onclick="setFilter('paid')">Paid</button>
                        <button class="filter-btn"        id="f-unpaid" onclick="setFilter('unpaid')">Unpaid</button>
                    </div>
 
                    <div class="panel-title" style="margin-top:20px;">Recent activity</div>
                    <div id="recent-list"></div>
                </div>
 
            </div>
        </section>
 
        <!-- ALL INVOICES TABLE -->
        <section class="allInvoices-section">
            <div class="table-section">
                <div class="table-header">
                    <div class="table-title">All invoices</div>
                    <div class="table-controls">
                        <button onclick="sortByDate()">Sort by date</button>
                        <button onclick="sortByAmount()">Sort by amount</button>
                    </div>
                </div>
                <div id="table-wrap"><div class="empty">Loading…</div></div>
            </div>
        </section>
 
    </main>
 


<script src="invoices.js"></script>
</body>
</html>
